<!DOCTYPE html>
<html>
<head>
    <title>Smart QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 40px;">

<h2>Smart QR Code Generator</h2>

<textarea id="qrText" rows="6" cols="50"
placeholder="Enter text here"></textarea>
<br><br>

<button onclick="generateQR()">Generate QR</button>
<button onclick="downloadQR()">Download QR</button>

<br><br>
<canvas id="finalCanvas"></canvas>

<script>
function getQRLevel(textLength) {
    if (textLength < 800) return QRCode.CorrectLevel.H;
    if (textLength < 1200) return QRCode.CorrectLevel.Q;
    if (textLength < 1800) return QRCode.CorrectLevel.M;
    return QRCode.CorrectLevel.L;
}

function generateQR() {
    var text = document.getElementById("qrText").value;

    if (!text) {
        alert("Enter text first");
        return;
    }

    if (text.length > 3000) {
        alert("Text too long! Please reduce.");
        return;
    }

    var level = getQRLevel(text.length);

    var tempDiv = document.createElement("div");
    new QRCode(tempDiv, {
        text: text,
        width: 300,
        height: 300,
        correctLevel: level
    });

    setTimeout(function () {
        var qrCanvas = tempDiv.querySelector("canvas");
        var finalCanvas = document.getElementById("finalCanvas");
        var ctx = finalCanvas.getContext("2d");

        finalCanvas.width = 300;
        finalCanvas.height = 300;

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, 300, 300);

        ctx.drawImage(qrCanvas, 0, 0);

        // Safe center text
        var centerText = "Jahoo";
        ctx.font = "bold 12px Arial";

        var textWidth = ctx.measureText(centerText).width;
        var padding = 4;

        var rectX = (300 - textWidth) / 2 - padding;
        var rectY = 150 - 10;
        var rectWidth = textWidth + padding * 2;
        var rectHeight = 20;

        ctx.fillStyle = "#cccccc";
        ctx.fillRect(rectX, rectY, rectWidth, rectHeight);

        ctx.fillStyle = "black";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(centerText, 150, 150);

    }, 300);
}

function downloadQR() {
    var canvas = document.getElementById("finalCanvas");

    if (!canvas.width) {
        alert("Generate QR first!");
        return;
    }

    var link = document.createElement("a");
    link.href = canvas.toDataURL("image/png");
    link.download = "Smart_QR.png";
    link.click();
}
</script>

</body>
</html>
